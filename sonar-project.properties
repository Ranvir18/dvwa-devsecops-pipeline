sonar.projectKey=DVWA
sonar.projectName=DVWA
sonar.projectVersion=1.0

sonar.sources=.
sonar.sourceEncoding=UTF-8

# Only include PHP source files
sonar.inclusions=**/*.php

# Exclude everything else that isn't needed
sonar.exclusions=**/*.js,**/*.css,**/*.html,**/*.json,**/*.xml,**/*.yml,**/*.yaml,**/vendor/**,**/tests/**
